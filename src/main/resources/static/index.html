<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consumption Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    window.__mermaid = mermaid;
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: #f8fafc;
    }

    /* ── Markdown ── */
    .md { line-height: 1.7; }
    .md > *:first-child { margin-top: 0 }
    .md > *:last-child  { margin-bottom: 0 }
    .md h1 { font-size:1.2rem;  font-weight:700; margin: .9rem 0 .35rem; color:#0f172a }
    .md h2 { font-size:1.05rem; font-weight:700; margin: .8rem 0 .3rem;  color:#1e293b }
    .md h3 { font-size:.95rem;  font-weight:600; margin: .7rem 0 .25rem; color:#334155 }
    .md p  { margin:.4rem 0; color:#475569 }
    .md ul { list-style:disc;    padding-left:1.4rem; margin:.4rem 0 }
    .md ol { list-style:decimal; padding-left:1.4rem; margin:.4rem 0 }
    .md li { margin:.25rem 0; color:#475569 }
    .md strong { font-weight:600; color:#1e293b }
    .md em  { font-style:italic; color:#64748b }
    .md hr  { border:none; border-top:1px solid #e2e8f0; margin:.7rem 0 }
    .md a   { color:#0ea5e9; text-decoration:underline }
    .md blockquote {
      border-left: 3px solid #bae6fd;
      padding: .3rem .9rem; margin: .5rem 0;
      color: #64748b;
      background: #f0f9ff;
      border-radius: 0 .5rem .5rem 0;
    }
    .md code {
      background: #f1f5f9; color:#0284c7;
      padding:.15rem .4rem; border-radius:.3rem;
      font-family:'JetBrains Mono','Fira Code',monospace; font-size:.8em;
    }
    .md pre {
      background: #f1f5f9; border:1px solid #e2e8f0;
      padding:.85rem 1rem; border-radius:.7rem; overflow-x:auto; margin:.6rem 0;
    }
    .md pre code { background:none; color:#0369a1; padding:0 }

    /* tables */
    .md table { border-collapse:collapse; width:100%; margin:.75rem 0; font-size:.8rem }
    .md thead { background: #e0f2fe }
    .md th {
      padding:.5rem .85rem; font-weight:600; color:#0369a1;
      border:1px solid #bae6fd; text-align:left; white-space:nowrap;
    }
    .md td { padding:.45rem .85rem; border:1px solid #e2e8f0; color:#475569 }
    .md tbody tr:nth-child(odd)  td { background:#f8fafc }
    .md tbody tr:nth-child(even) td { background:#ffffff }
    .md tbody tr:hover td { background:#f0f9ff; color:#0f172a; transition:all .12s }

    /* loading dots */
    .ai-dots { display:flex; gap:5px; align-items:center; padding:4px 0 }
    .ai-dot {
      width:7px; height:7px; border-radius:50%;
      animation: aiPulse 1.5s cubic-bezier(.36,.07,.19,.97) infinite;
    }
    .ai-dot:nth-child(1) { background:#0ea5e9; animation-delay:0s }
    .ai-dot:nth-child(2) { background:#6366f1; animation-delay:0.18s }
    .ai-dot:nth-child(3) { background:#8b5cf6; animation-delay:0.36s }
    @keyframes aiPulse {
      0%,55%,100% { transform:scale(0.6) translateY(0); opacity:0.35 }
      28%          { transform:scale(1.15) translateY(-5px); opacity:1 }
    }

    /* streaming — inline cursor */
    .stream-body.streaming::after {
      content:'';
      display:inline-block;
      width:2px; height:0.85em;
      background:#0ea5e9;
      margin-left:2px; vertical-align:-0.05em;
      border-radius:1px;
      animation: curBlink 0.75s ease-in-out infinite;
    }
    @keyframes curBlink { 0%,100%{opacity:1} 50%{opacity:0.1} }

    /* token fade-in during streaming */
    .tok { animation: tokIn 0.18s ease both }
    @keyframes tokIn { from{opacity:0} to{opacity:1} }

    /* markdown reveal after streaming */
    .md-reveal { animation: mdReveal 0.22s ease both }
    @keyframes mdReveal { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

    /* message enter */
    .msg-enter { animation: rise .22s ease forwards }
    @keyframes rise { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* scrollbar */
    #messages::-webkit-scrollbar { width:4px }
    #messages::-webkit-scrollbar-track { background:transparent }
    #messages::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:2px }

    /* input wrapper focus ring */
    .input-ring:focus-within {
      border-color: #7dd3fc !important;
      box-shadow: 0 0 0 3px rgba(125,211,252,.2);
    }

    /* copy button — visible on hover of parent */
    .copy-btn { opacity:0; transition:opacity .15s }
    .agent-row:hover .copy-btn { opacity:1 }

    /* suggestion cards */
    .s-card:hover {
      border-color: #7dd3fc !important;
      background: #f0f9ff !important;
      transform: translateY(-1px);
    }
    .s-card { transition: all .18s ease }

    /* toast */
    #toast {
      position:fixed; bottom:88px; left:50%;
      transform: translateX(-50%) translateY(6px);
      transition: all .2s ease; opacity:0; pointer-events:none; z-index:100;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0) }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <!-- ── Header ── -->
  <header class="flex-shrink-0 flex items-center justify-between px-5 py-3 border-b"
          style="background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-color:#e2e8f0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center"
           style="background:#0ea5e9">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold leading-tight" style="color:#0f172a">Consumption Agent</p>
        <p class="text-[11px]" style="color:#94a3b8">AI-powered electricity analysis</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2.5 text-[11px]" style="color:#94a3b8">
        <span>GPT-4o</span>
        <span class="w-px h-3" style="background:#e2e8f0"></span>
        <span>SQLite</span>
        <span class="w-px h-3" style="background:#e2e8f0"></span>
        <span>Spring AI</span>
      </div>
      <div class="flex items-center gap-1.5 text-[11px]" style="color:#0ea5e9">
        <span class="w-1.5 h-1.5 rounded-full animate-pulse"
              style="background:#34d399;box-shadow:0 0 6px rgba(52,211,153,.5)"></span>
        Live
      </div>
    </div>
  </header>

  <!-- ── Body ── -->
  <div id="messages" class="flex-1 overflow-y-auto relative">

    <!-- empty state -->
    <div id="empty" class="absolute inset-0 flex flex-col items-center justify-center px-4">
      <div class="text-center mb-10">
        <div class="w-16 h-16 rounded-2xl mx-auto mb-5 flex items-center justify-center"
             style="background:#0ea5e9;box-shadow:0 4px 24px rgba(14,165,233,.25)">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <h2 class="text-xl font-semibold mb-1.5" style="color:#0f172a">What would you like to know?</h2>
        <p class="text-sm" style="color:#94a3b8">Ask about your electricity data in plain language</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full max-w-2xl">

        <button class="s-card text-left p-4 rounded-2xl border cursor-pointer"
                style="background:#ffffff;border-color:#e2e8f0"
                data-q="What was my electricity consumption yesterday?">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3"
               style="background:#e0f2fe">
            <svg class="w-4.5 h-4.5" style="color:#0ea5e9;width:18px;height:18px"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <p class="text-xs font-semibold mb-1.5" style="color:#0284c7">Daily Usage</p>
          <p class="text-xs leading-relaxed" style="color:#94a3b8">What was my electricity consumption yesterday?</p>
        </button>

        <button class="s-card text-left p-4 rounded-2xl border cursor-pointer"
                style="background:#ffffff;border-color:#e2e8f0"
                data-q="Show me the peak power usage in the last 24 hours">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3"
               style="background:#fff7ed">
            <svg style="color:#f97316;width:18px;height:18px"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <p class="text-xs font-semibold mb-1.5" style="color:#ea580c">Peak Detection</p>
          <p class="text-xs leading-relaxed" style="color:#94a3b8">Show me the peak power usage in the last 24 hours</p>
        </button>

        <button class="s-card text-left p-4 rounded-2xl border cursor-pointer"
                style="background:#ffffff;border-color:#e2e8f0"
                data-q="Detect any unusual consumption patterns this week">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3"
               style="background:#faf5ff">
            <svg style="color:#9333ea;width:18px;height:18px"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
          </div>
          <p class="text-xs font-semibold mb-1.5" style="color:#7c3aed">Anomaly Report</p>
          <p class="text-xs leading-relaxed" style="color:#94a3b8">Detect any unusual consumption patterns this week</p>
        </button>

      </div>
    </div>

    <!-- chat thread (hidden until first message) -->
    <div id="chat" class="hidden max-w-3xl mx-auto px-4 py-6 space-y-6"></div>

  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="text-xs font-medium px-4 py-2 rounded-xl"
       style="background:#f0f9ff;color:#0284c7;border:1px solid #bae6fd">
    Copied!
  </div>

  <!-- ── Input ── -->
  <div class="flex-shrink-0 px-4 py-4 border-t"
       style="background:#ffffff;border-color:#e2e8f0">
    <form id="form" class="max-w-3xl mx-auto">
      <div class="input-ring flex items-center gap-3 rounded-2xl px-4 py-3 border transition-all"
           style="background:#f8fafc;border-color:#e2e8f0">
        <input id="q" type="text" autocomplete="off"
               placeholder="Ask about your electricity consumption…"
               class="flex-1 bg-transparent text-sm border-none outline-none"
               style="color:#0f172a;caret-color:#0ea5e9" />
        <button id="btn" type="submit"
                class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0
                       disabled:opacity-25 disabled:cursor-not-allowed transition-all"
                style="background:#0ea5e9;box-shadow:0 2px 8px rgba(14,165,233,.3)">
          <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <p class="text-center text-[10px] mt-1.5" style="color:#cbd5e1">
        Press <kbd class="px-1 rounded" style="background:#f1f5f9;color:#94a3b8">Enter</kbd> to send
      </p>
    </form>
  </div>

  <script>
    const emptyEl    = document.getElementById('empty');
    const chatEl     = document.getElementById('chat');
    const messagesEl = document.getElementById('messages');
    const form       = document.getElementById('form');
    const qEl        = document.getElementById('q');
    const btnEl      = document.getElementById('btn');
    const toastEl    = document.getElementById('toast');

    // Stable session ID — persists across page reloads, unique per tab/session
    const conversationId = (() => {
      const key = 'ca_conv_id';
      let id = sessionStorage.getItem(key);
      if (!id) { id = crypto.randomUUID(); sessionStorage.setItem(key, id); }
      return id;
    })();

    marked.use({ gfm: true, breaks: true });

    function renderMd(raw) {
      const html = marked.parse(raw);
      return DOMPurify.sanitize(
        typeof html === 'string' ? html : '',
        {
          ALLOWED_TAGS: ['h1','h2','h3','h4','h5','h6','p','br','strong','em','del',
                         'code','pre','ul','ol','li','blockquote','hr','a',
                         'table','thead','tbody','tr','th','td','span'],
          ALLOWED_ATTR: ['href','class','target','rel']
        }
      );
    }

    // SSE: multi-line data fields in one event must be joined with \n (spec).
    // Spring splits tokens containing \n across multiple data: lines.
    function processEvent(event) {
      const parts = event
        .split('\n')
        .filter(l => l.startsWith('data:'))
        .map(l => {
          const raw = l.slice(5);
          try { const p = JSON.parse(raw); if (typeof p === 'string') return p; } catch {}
          return raw;
        });
      if (!parts.length) return null;
      const chunk = parts.join('\n');
      return (chunk === '[DONE]' || chunk === '') ? null : chunk;
    }

    const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const scrollBottom = () => { messagesEl.scrollTop = messagesEl.scrollHeight; };
    const ts = () => new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    let chatVisible = false;
    function ensureChat() {
      if (chatVisible) return;
      chatVisible = true;
      emptyEl.classList.add('hidden');
      chatEl.classList.remove('hidden');
    }

    let toastTimer;
    function showToast() {
      clearTimeout(toastTimer);
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    async function renderMermaid(container) {
      const mermaid = window.__mermaid;
      if (!mermaid) return;
      const blocks = container.querySelectorAll('code.language-mermaid');
      let idx = 0;
      for (const block of blocks) {
        const source = block.textContent;
        const pre    = block.parentElement;
        const id     = 'mermaid-' + Date.now() + '-' + idx++;
        try {
          const { svg } = await mermaid.render(id, source);
          const div = document.createElement('div');
          div.style.cssText = 'background:#f8fafc;border:1px solid #e2e8f0;border-radius:.75rem;padding:1rem;margin:.6rem 0;overflow-x:auto;text-align:center';
          div.innerHTML = svg;
          pre.replaceWith(div);
        } catch (e) {
          const err = document.createElement('p');
          err.style.cssText = 'color:#ef4444;font-size:.75rem;margin:.4rem 0';
          err.textContent = 'Chart error: ' + e.message;
          pre.replaceWith(err);
        }
      }
    }

    function addUserBubble(text) {
      ensureChat();
      const el = document.createElement('div');
      el.className = 'msg-enter flex items-end justify-end gap-2';
      el.innerHTML = `
        <span class="text-[10px] mb-0.5" style="color:#cbd5e1">${ts()}</span>
        <div class="rounded-2xl rounded-br-sm px-4 py-2.5 text-sm max-w-lg"
             style="background:#0ea5e9;color:#ffffff;box-shadow:0 2px 12px rgba(14,165,233,.25)">
          ${esc(text)}
        </div>`;
      chatEl.appendChild(el);
      scrollBottom();
    }

    function addAgentBubble() {
      const wrap = document.createElement('div');
      wrap.className = 'msg-enter agent-row flex gap-3 items-start';
      wrap.innerHTML = `
        <div class="w-7 h-7 rounded-xl flex-shrink-0 mt-0.5 flex items-center justify-center"
             style="background:#0ea5e9;box-shadow:0 2px 8px rgba(14,165,233,.2)">
          <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1.5">
            <span class="text-[11px] font-semibold" style="color:#0284c7">Consumption Agent</span>
            <span class="text-[10px]" style="color:#cbd5e1">${ts()}</span>
            <button class="copy-btn ml-auto flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-lg"
                    style="color:#94a3b8;background:#f1f5f9;border:1px solid #e2e8f0"
                    onclick="copyMsg(this)">
              <svg style="width:11px;height:11px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
              </svg>
              Copy
            </button>
          </div>
          <div class="rounded-2xl rounded-tl-sm px-4 py-3 overflow-x-auto"
               style="background:#ffffff;border:1px solid #e2e8f0">
            <div class="stream-body text-sm streaming">
              <div class="ai-dots">
                <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
              </div>
            </div>
          </div>
        </div>`;
      chatEl.appendChild(wrap);
      scrollBottom();

      const body = wrap.querySelector('.stream-body');
      return {
        appendToken(chunk) {
          const dots = body.querySelector('.ai-dots');
          if (dots) dots.remove();
          const span = document.createElement('span');
          span.className = 'tok';
          span.textContent = chunk;
          body.appendChild(span);
        },
        finalize(html) {
          body.classList.remove('streaming');
          body.innerHTML = html;
          body.classList.add('md', 'md-reveal');
        },
        setError(msg) {
          body.classList.remove('streaming');
          body.innerHTML = `<span style="color:#ef4444;font-size:.8rem">Error: ${msg}</span>`;
        },
        get el() { return body; }
      };
    }

    function copyMsg(btn) {
      const body = btn.closest('.flex-1').querySelector('.stream-body');
      if (!body) return;
      navigator.clipboard.writeText(body.innerText).then(showToast);
    }

    function setLoading(on) {
      btnEl.disabled = on;
      qEl.disabled   = on;
    }

    async function ask(question) {
      addUserBubble(question);
      setLoading(true);

      const bubble = addAgentBubble();
      let accumulated = '';

      try {
        const res = await fetch('/api/consumption/ask/stream', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ question, conversationId })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buf += decoder.decode(value, { stream: true });
          const events = buf.split('\n\n');
          buf = events.pop();

          for (const event of events) {
            const chunk = processEvent(event);
            if (chunk === null) continue;
            accumulated += chunk;
            bubble.appendToken(chunk);
            scrollBottom();
          }
        }

        if (buf) {
          const chunk = processEvent(buf);
          if (chunk !== null) accumulated += chunk;
        }

        bubble.finalize(
          accumulated
            ? renderMd(accumulated)
            : '<span style="color:#cbd5e1;font-style:italic;font-size:.75rem">No response.</span>'
        );

      } catch (err) {
        bubble.setError(esc(err.message));
      } finally {
        await renderMermaid(bubble.el);
        scrollBottom();
        setLoading(false);
        qEl.focus();
      }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const q = qEl.value.trim();
      if (!q) return;
      qEl.value = '';
      ask(q);
    });

    document.querySelectorAll('.s-card').forEach(c =>
      c.addEventListener('click', () => ask(c.dataset.q))
    );

    qEl.focus();
  </script>
</body>
</html>
