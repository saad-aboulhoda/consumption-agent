<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consumption Agent</title>
  <script>
    (function () {
      const stored = localStorage.getItem('ca_theme');
      const theme  = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    const mermaidTheme = () =>
      document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
    const mermaidConfig = () => ({
      startOnLoad: false, theme: mermaidTheme(), securityLevel: 'loose',
      xyChart: { useMaxWidth: false }
    });
    mermaid.initialize(mermaidConfig());
    window.__mermaid = mermaid;
    window.__mermaidRetheme = () => mermaid.initialize(mermaidConfig());
  </script>
  <link rel="stylesheet" href="theme/voltage.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <header class="app-header flex-shrink-0 flex items-center justify-between px-5 py-3">
    <div class="flex items-center gap-3">
      <div class="brand-mark w-8 h-8 rounded-xl flex items-center justify-center overflow-hidden">
        <img src="images/logo.png" alt="Consumption Agent logo" />
      </div>
      <div>
        <p class="text-sm font-semibold leading-tight">Consumption Agent</p>
        <p class="text-[11px] text-dim" style="color:var(--text-dim)">AI-powered electricity analysis</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <button id="themeToggle" type="button"
              class="theme-toggle relative w-8 h-8 rounded-xl flex-shrink-0 cursor-pointer"
              aria-label="Switch to light theme" aria-pressed="false">
        <span class="icon-moon" aria-hidden="true">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </span>
        <span class="icon-sun" aria-hidden="true">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </span>
      </button>
    </div>
  </header>

  <div id="messages" class="flex-1 overflow-y-auto relative">

    <div id="empty" class="absolute inset-0 flex flex-col items-center justify-center px-4">
      <div class="text-center mb-10">
        <div class="empty-icon w-20 h-20 rounded-2xl mx-auto mb-5 flex items-center justify-center overflow-hidden">
          <img src="images/logo.png" alt="Consumption Agent logo" />
        </div>
        <h2 class="empty-title text-xl font-semibold mb-1.5">What would you like to know?</h2>
        <p class="empty-sub text-sm">Ask about your electricity data in plain language</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full max-w-2xl">

        <button class="s-card accent-amber text-left p-4 rounded-2xl border cursor-pointer"
                data-q="What was my electricity consumption yesterday?">
          <div class="icon-chip amber w-9 h-9 rounded-xl flex items-center justify-center mb-3">
            <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <p class="s-title amber text-xs font-semibold mb-1.5">Daily Usage</p>
          <p class="s-desc text-xs leading-relaxed">What was my electricity consumption yesterday?</p>
        </button>

        <button class="s-card accent-cyan text-left p-4 rounded-2xl border cursor-pointer"
                data-q="Show me the peak power usage in the last 24 hours">
          <div class="icon-chip cyan w-9 h-9 rounded-xl flex items-center justify-center mb-3">
            <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <p class="s-title cyan text-xs font-semibold mb-1.5">Peak Detection</p>
          <p class="s-desc text-xs leading-relaxed">Show me the peak power usage in the last 24 hours</p>
        </button>

        <button class="s-card accent-violet text-left p-4 rounded-2xl border cursor-pointer"
                data-q="Detect any unusual consumption patterns this week">
          <div class="icon-chip violet w-9 h-9 rounded-xl flex items-center justify-center mb-3">
            <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
          </div>
          <p class="s-title violet text-xs font-semibold mb-1.5">Anomaly Report</p>
          <p class="s-desc text-xs leading-relaxed">Detect any unusual consumption patterns this week</p>
        </button>

      </div>
    </div>

    <div id="chat" class="hidden max-w-3xl mx-auto px-4 py-6 space-y-6"></div>

  </div>

  <div id="toast" role="status" aria-live="polite" class="text-xs font-medium px-4 py-2 rounded-xl">
    Copied!
  </div>

  <div class="input-bar flex-shrink-0 px-4 py-4">
    <form id="form" class="max-w-3xl mx-auto flex items-stretch gap-3">
      <label for="q" class="sr-only">Ask about your electricity consumption</label>
      <input id="q" type="text" autocomplete="off"
             placeholder="Ask about your electricity consumption…"
             class="field flex-1 min-w-0 rounded-xl px-4 text-base sm:text-sm outline-none transition-all" />
      <button id="btn" type="submit" aria-label="Send message"
              class="send-btn w-12 rounded-xl flex items-center justify-center flex-shrink-0
                     disabled:opacity-25 disabled:cursor-not-allowed transition-all cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </form>
    <p class="hint text-center text-[10px] mt-1.5">
      Press <kbd class="key px-1 rounded">Enter</kbd> to send
    </p>
  </div>

  <div id="chartModal" class="chart-modal hidden" role="dialog" aria-modal="true" aria-label="Enlarged chart">
    <button id="chartModalClose" class="chart-modal-close" type="button" aria-label="Close chart">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <div id="chartModalBody" class="chart-modal-body"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
